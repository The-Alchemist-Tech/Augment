version: "2.4"

services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: augment
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  # Your Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=augment
      - DB_USER=user
      - DB_PASSWORD=userpassword
    depends_on:
      db:
        condition: service_healthy
    # Wait for the database to be ready before starting the application
    # depends_on is not reliable enough, so we use a custom command to wait for the database
    command: >
      sh -c '
        until mysqladmin ping -h db -u root -prootpassword >/dev/null 2>&1;
        do sleep 20;
        done;
        /app/app
      '

volumes:
  db_data: